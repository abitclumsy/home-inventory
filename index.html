<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wohnungs-Inventar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===== NAVIGATION ===== -->
<nav>
  <div class="nav-logo">🏠 <span>Inventar</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('rooms')">🏠 Räume</button>
    <button class="nav-tab" onclick="switchPage('all')">📋 Alle Gegenstände</button>
    <button class="nav-tab" onclick="switchPage('stats')">📊 Statistik</button>
  </div>
  <div class="nav-stats">
    <span><strong id="stat-rooms">0</strong> Räume</span>
    <span><strong id="stat-items">0</strong> Gegenstände</span>
    <span title="Daten werden automatisch im Browser gespeichert" style="cursor:default">💾 Auto-Speichern</span>
  </div>
</nav>

<!-- ===== MAIN CONTENT ===== -->
<main>

  <!-- RÄUME ÜBERSICHT -->
  <div id="page-rooms" class="page active">
    <div class="section-header">
      <div>
        <div class="section-title">Meine Wohnung</div>
        <div class="section-sub">Übersicht aller Räume und ihr Inventar</div>
      </div>
      <button class="btn btn-primary" onclick="openAddRoom()">＋ Raum hinzufügen</button>
    </div>
    <div class="rooms-grid" id="rooms-grid"></div>
  </div>

  <!-- RAUM DETAIL -->
  <div id="page-room-detail" class="page">
    <div class="breadcrumb">
      <a onclick="switchPage('rooms')">🏠 Räume</a> › <span id="room-detail-name">–</span>
    </div>
    <div class="section-header">
      <div>
        <div class="section-title" id="room-detail-title">–</div>
        <div class="section-sub" id="room-detail-sub">–</div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary btn-sm" onclick="editCurrentRoom()">✏️ Raum bearbeiten</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentRoom()">🗑 Raum löschen</button>
        <button class="btn btn-primary" onclick="openAddItem()">＋ Gegenstand hinzufügen</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Gegenstände suchen…" oninput="filterRoomItems(this.value)" id="room-search">
      </div>
      <select class="filter-select" onchange="filterByCondition(this.value)">
        <option value="">Alle Zustände</option>
        <option value="Gut">✅ Gut</option>
        <option value="Mittel">⚠️ Mittel</option>
        <option value="Schlecht">❌ Schlecht</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="vbtn-grid" onclick="setView('grid')" title="Kachelansicht">⊞</button>
        <button class="view-btn" id="vbtn-list" onclick="setView('list')" title="Listenansicht">☰</button>
      </div>
    </div>
    <div id="room-items-container"></div>
  </div>

  <!-- ALLE GEGENSTÄNDE -->
  <div id="page-all" class="page">
    <div class="section-header">
      <div>
        <div class="section-title">Alle Gegenstände</div>
        <div class="section-sub">Vollständiges Inventar der gesamten Wohnung</div>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Gegenstände suchen…" oninput="filterAllItems(this.value)">
      </div>
      <select class="filter-select" onchange="filterAllByRoom(this.value)" id="room-filter-select">
        <option value="">Alle Räume</option>
      </select>
      <select class="filter-select" onchange="filterAllByCondition(this.value)">
        <option value="">Alle Zustände</option>
        <option value="Gut">✅ Gut</option>
        <option value="Mittel">⚠️ Mittel</option>
        <option value="Schlecht">❌ Schlecht</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="avbtn-grid" onclick="setAllView('grid')" title="Kacheln">⊞</button>
        <button class="view-btn" id="avbtn-list" onclick="setAllView('list')" title="Liste">☰</button>
      </div>
    </div>
    <div id="all-items-container"></div>
  </div>

  <!-- STATISTIK -->
  <div id="page-stats" class="page">
    <div class="section-header">
      <div class="section-title">Statistik & Übersicht</div>
    </div>
    <div class="stats-grid" id="stats-cards"></div>
    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-title">Gegenstände pro Raum</div>
        <div id="chart-rooms"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Zustand der Gegenstände</div>
        <div id="chart-conditions"></div>
      </div>
    </div>
  </div>

</main>

<!-- ===== RAUM MODAL ===== -->
<div id="room-modal" class="modal-overlay" style="display:none" onclick="closeRoomModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="room-modal-title">Raum hinzufügen</div>
    <div class="form-group">
      <label class="form-label">Name des Raums</label>
      <input type="text" class="form-input" id="rm-name" placeholder="z.B. Wohnzimmer">
    </div>
    <div class="form-group">
      <label class="form-label">Icon wählen</label>
      <div class="icon-picker" id="room-icon-picker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Farbe</label>
      <div class="color-picker-row" id="room-color-picker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Notizen</label>
      <input type="text" class="form-input" id="rm-notes" placeholder="Optionale Notizen…">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeRoomModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveRoom()">Speichern</button>
    </div>
  </div>
</div>

<!-- ===== GEGENSTAND MODAL ===== -->
<div id="item-modal" class="modal-overlay" style="display:none" onclick="closeItemModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="item-modal-title">Gegenstand hinzufügen</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input" id="it-name" placeholder="z.B. Sofa, Tisch, Lampe…">
    </div>
    <div class="form-group">
      <label class="form-label">Icon wählen</label>
      <div class="icon-picker" id="item-icon-picker"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Anzahl</label>
        <input type="number" class="form-input" id="it-qty" value="1" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Zustand</label>
        <select class="form-input" id="it-condition">
          <option value="Gut">✅ Gut</option>
          <option value="Mittel">⚠️ Mittel</option>
          <option value="Schlecht">❌ Schlecht</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Kategorie</label>
        <select class="form-input" id="it-cat">
          <option>Möbel</option>
          <option>Elektro</option>
          <option>Küche</option>
          <option>Bad</option>
          <option>Beleuchtung</option>
          <option>Dekoration</option>
          <option>Textilien</option>
          <option>Werkzeug</option>
          <option>Sport</option>
          <option>Sonstiges</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Kaufjahr</label>
        <input type="number" class="form-input" id="it-year" placeholder="z.B. 2020">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Hersteller / Marke</label>
      <input type="text" class="form-input" id="it-brand" placeholder="z.B. IKEA, Bosch…">
    </div>
    <div class="form-group">
      <label class="form-label">Notizen</label>
      <input type="text" class="form-input" id="it-notes" placeholder="Seriennummer, Besonderheiten…">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeItemModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveItem()">Speichern</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast"></div>

<!-- ===== SCRIPTS (Reihenfolge wichtig!) ===== -->
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/render.js"></script>
<script src="js/modals.js"></script>
<script src="js/stats.js"></script>
<script src="js/app.js"></script>

</body>
</html>
