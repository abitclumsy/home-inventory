<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wohnungs-Inventar – Meine Räume</title>
  <meta name="description" content="Private Bestandsaufnahme der Wohnung – Räume, Gegenstände und Statistiken.">

  <!-- Robots: App ist privat, nicht indexieren -->
  <meta name="robots" content="noindex, nofollow">

  <!-- Self-referencing Canonical -->
  <link rel="canonical" href="https://DEINE-DOMAIN.de/index.html">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <!-- JSON-LD: WebApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Wohnungs-Inventar",
    "description": "Interaktive App zur Bestandsaufnahme einer Wohnung – Räume, Gegenstände, Zustand und Statistiken.",
    "url": "https://DEINE-DOMAIN.de/index.html",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Web",
    "inLanguage": "de",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "EUR"
    }
  }
  </script>
</head>
<body>

  <!-- Navigation (wird per nav.js gerendert) -->
  <nav id="main-nav"></nav>

  <main>
    <div class="page-header">
      <div>
        <h1 class="section-title">Meine Wohnung</h1>
        <p class="section-sub">Übersicht aller Räume und ihr Inventar</p>
      </div>
      <button class="btn btn-primary" onclick="openAddRoom()">＋ Raum hinzufügen</button>
    </div>

    <div class="rooms-grid" id="rooms-grid"></div>

    <!-- Schnellzugriff auf alle Seiten -->
    <section class="quicklinks-section">
      <h2 class="quicklinks-title">Schnellzugriff</h2>
      <div class="quicklinks-grid">
        <a href="alle-gegenstaende.html" class="quicklink-card">
          <span class="quicklink-icon">📋</span>
          <div class="quicklink-name">Alle Gegenstände</div>
          <div class="quicklink-desc">Vollständiges Inventar aller Räume durchsuchen &amp; filtern</div>
          <span class="quicklink-arrow">→</span>
        </a>
        <a href="statistik.html" class="quicklink-card">
          <span class="quicklink-icon">📊</span>
          <div class="quicklink-name">Statistik</div>
          <div class="quicklink-desc">Auswertungen, Diagramme &amp; Übersicht deines Inventars</div>
          <span class="quicklink-arrow">→</span>
        </a>
        <a href="konto.html" class="quicklink-card">
          <span class="quicklink-icon">🔐</span>
          <div class="quicklink-name">Konto &amp; Sync</div>
          <div class="quicklink-desc">Anmelden für geräteübergreifende Synchronisation</div>
          <span class="quicklink-arrow">→</span>
        </a>
      </div>
    </section>
  </main>

  <!-- Raum-Modal -->
  <div id="room-modal" class="modal-overlay" style="display:none" onclick="closeRoomModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title" id="room-modal-title">Raum hinzufügen</div>
      <div class="form-group">
        <label class="form-label">Name des Raums</label>
        <input type="text" class="form-input" id="rm-name" placeholder="z.B. Wohnzimmer">
      </div>
      <div class="form-group">
        <label class="form-label">Icon wählen</label>
        <div class="icon-picker" id="room-icon-picker"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Farbe</label>
        <div class="color-picker-row" id="room-color-picker"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Notizen</label>
        <input type="text" class="form-input" id="rm-notes" placeholder="Optionale Notizen…">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeRoomModal()">Abbrechen</button>
        <button class="btn btn-primary" onclick="saveRoom()">Speichern</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/modals.js"></script>
  <script>
    // ── Räume-Seite ──────────────────────────
    let editingRoomId    = null;
    let selectedRoomIcon = ROOM_ICONS[0];
    let selectedRoomColor = COLORS[0];

    function renderRooms() {
      const grid = document.getElementById('rooms-grid');
      grid.innerHTML = '';
      state.rooms.forEach(room => {
        const items = state.items.filter(i => i.roomId === room.id);
        const cats  = [...new Set(items.map(i => i.category))].slice(0, 3);
        const card  = document.createElement('div');
        card.className = 'room-card';
        card.style.setProperty('--room-color', room.color);
        card.innerHTML = `
          <span class="room-icon">${room.icon}</span>
          <div class="room-name">${room.name}</div>
          <div class="room-count"><strong>${items.length}</strong> Gegenstände</div>
          <div class="room-tags">${cats.map(c => `<span class="room-tag">${c}</span>`).join('')}</div>
        `;
        card.onclick = () => { window.location.href = `room.html?id=${room.id}`; };
        grid.appendChild(card);
      });
      const add = document.createElement('button');
      add.className = 'add-room-card';
      add.innerHTML = `<span style="font-size:1.8rem">＋</span><span>Raum hinzufügen</span>`;
      add.onclick = openAddRoom;
      grid.appendChild(add);
    }

    function saveRoom() {
      const name = document.getElementById('rm-name').value.trim();
      if (!name) { alert('Bitte einen Namen eingeben.'); return; }
      if (editingRoomId) {
        const r = state.rooms.find(x => x.id === editingRoomId);
        Object.assign(r, { name, icon: selectedRoomIcon, color: selectedRoomColor, notes: document.getElementById('rm-notes').value });
        showToast('Raum aktualisiert ✓');
      } else {
        state.rooms.push({ id: state.nextRoomId++, name, icon: selectedRoomIcon, color: selectedRoomColor, notes: document.getElementById('rm-notes').value });
        showToast('Raum hinzugefügt ✓');
      }
      saveState();
      closeRoomModal();
      renderRooms();
      updateNavStats();
    }

    // Init
    initApp(() => { renderRooms(); });
  </script>
</body>
</html>
